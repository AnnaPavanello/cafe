
<main class="pagina-avaliar">

    <section class="formulario">

        <h2>Nova Avaliação</h2>

        <label>Café</label>
        <select>
            <option>Bourbon Amarelo</option>
            <option>Catuaí Vermelho</option>
            <option>Arara</option>
            <option>Mundo Novo</option>
        </select>

        <label>Aroma</label>
        <input type="number" min="0" max="10">

        <label>Doçura</label>
        <input type="number" min="0" max="10">

        <label>Acidez</label>
        <input type="number" min="0" max="10">

        <label>Corpo</label>
        <input type="number" min="0" max="10">

        <label>Finalização</label>
        <input type="number" min="0" max="10">

        <button>Salvar Avaliação</button>

    </section>

    <section class="metodologia">

        <h2>Metodologia</h2>

        <p>As avaliações seguem os critérios da metodologia SCA.</p>

        <ul>
            <li>Aroma</li>
            <li>Doçura</li>
            <li>Acidez</li>
            <li>Corpo</li>
            <li>Finalização</li>
        </ul>

        <p>Cada critério recebe uma nota de 0 a 10.</p>

        <p>A média final é calculada pela média das notas.</p>

    </section>

</main>
